<!-- Preloader -->
<div class="preloader" *ngIf="isLoading">
  <div class="loader-ripple">
    <div></div>
    <div></div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div *ngFor="let toast of toasts; let i = index" class="toast" [ngClass]="toast.type" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto">{{ toast.title }}</strong>
      <button type="button" class="btn-close" (click)="removeToast(i)" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      {{ toast.message }}
    </div>
  </div>
</div>

<!-- Login Area -->
<div class="auth-area py-120">
  <div class="container">
    <div class="col-md-5 mx-auto">
      <div class="auth-form">
        <div class="auth-header">
          <img src="assets/img/logo/logo arabsoft.png" alt="Logo">
          <p>Login with your account</p>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="form-group">
            <div class="form-icon">
              <i class="far fa-envelope"></i>
              <input type="email" formControlName="email" class="form-control" placeholder="Your Email" (blur)="validateField('email')" />
            </div>
          </div>
          <div class="form-group">
            <div class="form-icon">
              <i class="far fa-key"></i>
              <input [type]="showPassword ? 'text' : 'password'" formControlName="password" class="form-control" placeholder="Your Password" (blur)="validateField('password')" />
              <span class="password-view" (click)="togglePasswordVisibility()">
                <i [class]="showPassword ? 'far fa-eye' : 'far fa-eye-slash'"></i>
              </span>
            </div>
          </div>
          <div class="auth-group">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember" formControlName="remember">
              <label class="form-check-label" for="remember">Remember Me</label>
            </div>
            <a routerLink="/forgot-password" class="auth-group-link">Forgot Password?</a>
          </div>
          <!-- Ajout du widget reCAPTCHA v2 avec la nouvelle clé -->
          <div class="form-group">
            <div #recaptcha class="g-recaptcha" data-sitekey="6LeTs3grAAAAAFCb19B7xWiDl80s5a9QL9CciIa1"></div>
          </div>
          <div class="auth-btn">
            <button type="submit" class="theme-btn" [disabled]="isLoading || !loginForm.get('recaptcha')?.value">
              <span class="far fa-sign-in"></span> Login
            </button>
          </div>
        </form>
        <div class="auth-bottom">
          <div class="auth-social">
            <p>Continue with social media</p>
            <div class="auth-social-list">
              <a href="#"><i class="fab fa-facebook-f"></i></a>
              <a href="#"><i class="fab fa-google"></i></a>
              <a href="#"><i class="fab fa-x-twitter"></i></a>
            </div>
          </div>
          <p class="auth-bottom-text">Don't have an account? <a routerLink="/register">Register</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
