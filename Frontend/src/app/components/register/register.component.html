<!-- preloader -->
<div class="preloader" *ngIf="isLoading">
    <div class="loader-ripple">
        <div></div>
        <div></div>
    </div>
</div>
<!-- preloader end -->

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div *ngFor="let toast of toasts; let i = index" class="toast" [ngClass]="toast.type" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto">{{ toast.title }}</strong>
      <button type="button" class="btn-close" (click)="removeToast(i)" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      {{ toast.message }}
    </div>
  </div>
</div>

<!-- Register Area (same template as login) -->
<div class="auth-area">
  <div class="auth-layout">
    <!-- Left side: illustration / branding -->
    <div class="auth-illustration">
      <div class="auth-illustration-overlay">
        <div class="auth-illustration-header">
          <div class="auth-brand">
            <div class="auth-brand-text">
             
            </div>
          </div>
         
        </div>
      </div>
    </div>

    <!-- Right side: register card -->
    <div class="auth-form">
      <div class="auth-header">
        <h2>Créer un compte</h2>
        <p>Rejoignez SmartTax en quelques secondes</p>
      </div>

      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="form-grid">
          <div class="form-group">
            <label for="firstName">Prénom</label>
            <div class="form-icon">
              <i class="far fa-user"></i>
              <input id="firstName" type="text" formControlName="firstName" class="form-control" placeholder="Votre prénom" (blur)="validateField('firstName')" />
            </div>
          </div>

          <div class="form-group">
            <label for="lastName">Nom</label>
            <div class="form-icon">
              <i class="far fa-user"></i>
              <input id="lastName" type="text" formControlName="lastName" class="form-control" placeholder="Votre nom" (blur)="validateField('lastName')" />
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Adresse Email</label>
          <div class="form-icon">
            <i class="far fa-envelope"></i>
            <input id="email" type="email" formControlName="email" class="form-control" placeholder="exemple@domaine.com" (blur)="validateField('email')" />
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="password">Mot de passe</label>
            <div class="form-icon">
              <i class="far fa-key"></i>
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                class="form-control"
                placeholder="Votre mot de passe"
                (input)="updatePasswordStrength()"
                (blur)="validateField('password')"
              />
              <span class="password-view" (click)="togglePasswordVisibility()">
                <i [class]="showPassword ? 'far fa-eye' : 'far fa-eye-slash'"></i>
              </span>
            </div>
            <div class="password-strength-bar">
              <div class="strength-label">{{ passwordStrength.label }}</div>
              <div class="progress">
                <div class="progress-bar" [ngClass]="passwordStrength.class" [style.width]="passwordStrength.width"></div>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirmer</label>
            <div class="form-icon">
              <i class="far fa-key"></i>
              <input
                id="confirmPassword"
                [type]="showConfirmPassword ? 'text' : 'password'"
                formControlName="confirmPassword"
                class="form-control"
                placeholder="Confirmez le mot de passe"
                (blur)="validateField('confirmPassword')"
              />
              <span class="password-view" (click)="toggleConfirmPasswordVisibility()">
                <i [class]="showConfirmPassword ? 'far fa-eye' : 'far fa-eye-slash'"></i>
              </span>
            </div>
          </div>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="dateNaissance">Date de naissance</label>
            <div class="form-icon">
              <i class="far fa-calendar"></i>
              <input id="dateNaissance" type="date" formControlName="dateNaissance" class="form-control" (blur)="validateField('dateNaissance')" />
            </div>
          </div>

          <div class="form-group">
            <label for="role">Rôle</label>
            <div class="form-icon">
              <i class="far fa-user-shield"></i>
              <select id="role" formControlName="role" class="form-control">
                <option value="CONTRIBUABLE">Contribuable</option>
                <option value="AGENT">Agent DGI</option>
                <option value="ADMIN">Administrateur</option>
              </select>
            </div>
          </div>
        </div>

        <div class="auth-btn">
          <button type="submit" class="theme-btn" [disabled]="isLoading">
            <span class="far fa-paper-plane"></span>
            <span>S'inscrire</span>
          </button>
        </div>

        <!-- <div class="auth-divider">
          <span>Ou</span>
        </div>

        <div class="auth-social-buttons">
          <button type="button" class="social-btn google-btn">
            <span class="social-icon">
              <i class="fab fa-google"></i>
            </span>
            <span>Continuer avec Google</span>
          </button>
          <button type="button" class="social-btn facebook-btn">
            <span class="social-icon">
              <i class="fab fa-facebook-f"></i>
            </span>
            <span>Continuer avec Facebook</span>
          </button>
        </div> -->
      </form>

      <div class="auth-bottom">
        <p class="auth-bottom-text">
          Déjà un compte ?
          <a routerLink="/login">Connectez-vous</a>
        </p>
      </div>
    </div>
  </div>
</div>
