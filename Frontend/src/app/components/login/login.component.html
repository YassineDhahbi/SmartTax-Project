<!-- Preloader -->
<div class="preloader" *ngIf="isLoading">
  <div class="loader-ripple">
    <div></div>
    <div></div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed top-0 end-0 p-3">
  <div *ngFor="let toast of toasts; let i = index" class="toast" [ngClass]="toast.type" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <strong class="me-auto">{{ toast.title }}</strong>
      <button type="button" class="btn-close" (click)="removeToast(i)" aria-label="Close"></button>
    </div>
    <div class="toast-body">
      {{ toast.message }}
    </div>
  </div>
</div>

<!-- Login Area -->
<div class="auth-area">
  <div class="auth-layout">
    <!-- Left side: illustration / branding -->
    <div class="auth-illustration">
      <div class="auth-illustration-overlay">
        <div class="auth-illustration-header">
          <div class="auth-brand">
            <div class="auth-brand-text">
           
            </div>
          </div>
          
         
        </div>
      </div>
    </div>

    <!-- Right side: login card -->
    <div class="auth-form">
      <div class="auth-header">
        <h2>Bienvenue</h2>
        <p>Connectez-vous à SmartTax</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="email">Adresse Email</label>
          <div class="form-icon">
            <i class="far fa-envelope"></i>
            <input
              id="email"
              type="email"
              formControlName="email"
              class="form-control"
              placeholder="exemple@domaine.com"
              (blur)="validateField('email')"
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="form-icon">
            <i class="far fa-key"></i>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              class="form-control"
              placeholder="Votre mot de passe"
              (blur)="validateField('password')"
            />
            <span class="password-view" (click)="togglePasswordVisibility()">
              <i [class]="showPassword ? 'far fa-eye' : 'far fa-eye-slash'"></i>
            </span>
          </div>
        </div>

        <div class="auth-group">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" formControlName="remember">
            <label class="form-check-label" for="remember">Se souvenir de moi</label>
          </div>
          <a routerLink="/forgot-password" class="auth-group-link">Mot de passe oublié ?</a>
        </div>

        <!-- reCAPTCHA -->
        <div class="form-group">
          <div #recaptcha class="g-recaptcha" data-sitekey="6LeTs3grAAAAAFCb19B7xWiDl80s5a9QL9CciIa1"></div>
        </div>

        <div class="auth-btn">
          <button type="submit" class="theme-btn" [disabled]="isLoading || !loginForm.get('recaptcha')?.value">
            <span class="far fa-sign-in"></span>
            <span>Se connecter</span>
          </button>
        </div>

        <!-- Divider -->
        <div class="auth-divider">
          <span>Ou</span>
        </div>

        <!-- Social logins -->
        <div class="auth-social-buttons">
          <button type="button" class="social-btn google-btn">
            <span class="social-icon">
              <i class="fab fa-google"></i>
            </span>
            <span>Connexion avec Google</span>
          </button>
          <button type="button" class="social-btn facebook-btn">
            <span class="social-icon">
              <i class="fab fa-facebook-f"></i>
            </span>
            <span>Connexion avec Facebook</span>
          </button>
        </div>
      </form>

      <div class="auth-bottom">
        <p class="auth-bottom-text">
          Pas encore de compte ?
          <a routerLink="/register">Inscrivez-vous</a>
        </p>
      </div>
    </div>
  </div>
</div>
