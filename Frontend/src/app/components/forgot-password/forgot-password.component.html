
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm p-4">
        <h2 class="mb-4 text-center">Mot de passe oublié</h2>
        <div *ngIf="successMessage" class="alert alert-success" role="alert">
          {{ successMessage }}
        </div>
        <div *ngIf="errorMessage" class="alert alert-danger" role="alert">
          {{ errorMessage }}
        </div>
        <form (ngSubmit)="onSubmit()" #forgotPasswordForm="ngForm">
          <div class="mb-3">
            <label for="email" class="form-label">Adresse e-mail</label>
            <input type="email" class="form-control" id="email" [(ngModel)]="email" name="email" required email>
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-primary" [disabled]="!forgotPasswordForm.valid">Envoyer le lien de réinitialisation</button>
          </div>
        </form>
        <div class="text-center mt-3">
          <a routerLink="/login">Retour à la connexion</a>
        </div>
      </div>
    </div>
  </div>
</div>
