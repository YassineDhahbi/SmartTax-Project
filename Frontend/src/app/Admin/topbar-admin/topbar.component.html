<header class="topbar">
  <div class="brand">
    <div class="logo">ST</div>
    <div class="brand-text">
      <h1>SmartTax Admin</h1>
      <p>Panneau de supervision fiscale</p>
    </div>
  </div>

  <div class="topbar-actions">
    <button class="icon-btn">?</button>
    <button class="icon-btn">⚙</button>
    <div class="search-box">
      <input type="text" placeholder="Rechercher un dossier, agent, contribuable..." />
    </div>
    <button class="btn ghost">Notifications</button>
    <button class="btn primary">Nouveau rapport</button>
    <button class="btn logout-btn" (click)="logout()" title="Déconnexion">
      <i class="fa-solid fa-sign-out-alt"></i>
    </button>
    <div class="avatar">AD</div>
  </div>
</header>
