<!-- Modal pour voir la raison de rejet -->
<div class="da__rejectModalOverlay" *ngIf="showRejectionReasonModal" (click)="closeRejectionReasonModal()">
  <div class="da__rejectModal" (click)="$event.stopPropagation()">
    <div class="da__rejectModalHeader">
      <div class="da__rejectModalIcon da__rejectModalIcon--info">
        <i class="fa-solid fa-info-circle"></i>
      </div>
      <h3 class="da__rejectModalTitle">Raison de rejet</h3>
      <button class="da__rejectModalClose" (click)="closeRejectionReasonModal()" title="Fermer">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
    
    <div class="da__rejectModalBody">
      <div class="da__rejectModalContent">
        <div class="da__rejectModalInfo" *ngIf="selectedImmatriculation">
          <div class="da__rejectModalItem">
            <strong>N° Dossier:</strong>
            <span>{{ selectedImmatriculation.dossierNumber || selectedImmatriculation.id }}</span>
          </div>
          <div class="da__rejectModalItem">
            <strong>Contribuable:</strong>
            <span>{{ getContribuableName(selectedImmatriculation) }}</span>
          </div>
          <div class="da__rejectModalItem">
            <strong>Statut:</strong>
            <span class="da__status da__status--rejected">Rejeté</span>
          </div>
        </div>
        
        <div class="da__rejectReasonDisplay">
          <label class="da__rejectModalLabel">
            <i class="fa-solid fa-exclamation-triangle"></i>
            Motif du rejet
          </label>
          <div class="da__rejectReasonText">
            {{ rejectionReasonToView }}
          </div>
        </div>
      </div>
    </div>

    <div class="da__rejectModalFooter">
      <button class="da__rejectModalBtn da__rejectModalBtn--confirm" (click)="closeRejectionReasonModal()">
        <i class="fa-solid fa-check"></i>
        Fermer
      </button>
    </div>
  </div>
</div>
